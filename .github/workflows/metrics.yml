name: Metrics
on:
  # 每天自动更新一次
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发更新
  workflow_dispatch:
  # 每次你向仓库推送代码时触发
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # 1. 生成左侧的 GitHub 基础数据和 3D 贡献图
      - name: Left Metrics (GitHub Stats)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.left.svg
          base: header, activity, community, repositories, metadata
          # 3D 贡献日历插件
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # 语言占比插件
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          # 粉丝头像插件
          plugin_followup: yes
          plugin_followup_sections: user

      # 2. 生成右侧的 Apple Music 音乐卡片
      - name: Right Metrics (Music)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.right.svg
          base: "" 
          plugin_music: yes
          plugin_music_provider: apple
          plugin_music_mode: playlist
          plugin_music_playlist: https://music.apple.com/cn/playlist/%E5%8A%A8%E6%BC%AB%E9%9F%B3%E4%B9%90%E5%89%8D%E7%BA%BF/pl.89d598cd24cb4cf89895085a0fa278ec
          plugin_music_limit: 1

      # 3. 生成 Steam 游戏数据卡片
      - name: Steam Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.steam.full.svg
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561199125471550"
