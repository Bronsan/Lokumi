name: Metrics
on:
  # 每天自动更新一次
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发更新
  workflow_dispatch:
  # 每次你向仓库推送代码时触发
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # 1. 生成左侧的 GitHub 基础数据和 3D 贡献图
      - name: Left Metrics (GitHub Stats)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.left.svg
          base: header, activity, community, repositories, metadata
          # 3D 贡献日历插件
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # 语言占比插件
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          # 粉丝头像插件
          plugin_followup: yes
          plugin_followup_sections: user

      # 2. 生成右侧的娱乐/生活数据（音乐、动漫等）
      - name: Right Metrics (Music & Anime)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.right.svg
          base: "" # 关闭基础数据，只保留插件

          # 音乐推荐插件
          plugin_music: yes
          plugin_music_provider: apple
          plugin_music_mode: album
          plugin_music_playlist: https://embed.music.apple.com/cn/album/sugar-flavor-single/6776533418
          plugin_music_limit: 5
          # Anilist 动漫/漫画插件
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 4
          plugin_anilist_user: 你的Anilist用户名 # 需要你在 anilist.co 有账号

      - name: Profile and detailed game history
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.steam.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561199125471550"
